name: Release Pipeline

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v1.1.0

jobs:
  # ────────────────────────────────────────────────────────
  # 1. LINUX DEB BUILD (Ubuntu)
  # ────────────────────────────────────────────────────────
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg

      - name: Build and Package DEB
        run: mvn clean package -Plinux-deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: peerlink-ubuntu-deb
          path: dist/linux/*.deb

  # ────────────────────────────────────────────────────────
  # 2. LINUX RPM BUILD (Fedora container)
  # ────────────────────────────────────────────────────────
  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y java-21-openjdk-devel maven rpm-build fakeroot

      - name: Build and Package RPM
        run: mvn clean package -Plinux-rpm

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: peerlink-fedora-rpm
          path: dist/linux/*.rpm

  # ────────────────────────────────────────────────────────
  # 3. WINDOWS BUILD (EXE and MSI)
  # ────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package Windows
        run: mvn clean package -Pwindows

      - name: Upload Windows Installers
        uses: actions/upload-artifact@v4
        with:
          name: peerlink-windows
          path: dist/windows/*

  # ────────────────────────────────────────────────────────
  # 4. MACOS BUILD (DMG)
  # ────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package DMG
        run: mvn clean package -Pmac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: peerlink-macos-dmg
          path: dist/mac/*.dmg

  # ────────────────────────────────────────────────────────
  # 5. GITHUB RELEASES
  # ────────────────────────────────────────────────────────
  release:
    needs: [build-linux-deb, build-linux-rpm, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/**/*
          generate_release_notes: true
